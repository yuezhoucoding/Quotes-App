<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Quotes CSV</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 80px auto; text-align: center; background: #f5f5f5; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; font-size: 14px; line-height: 1.6; }
    button {
      background: #c9a84c; border: none; border-radius: 10px;
      color: #fff; font-size: 16px; font-weight: 700;
      padding: 14px 32px; cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    #result { margin-top: 20px; font-size: 14px; color: #333; }
  </style>
</head>
<body>
  <h1>Generate Quotes CSV</h1>
  <p>Click the button to download <strong>quotes.csv</strong> with all your existing quotes.<br>
  Then import it into Google Sheets.</p>
  <button onclick="generate()">Download quotes.csv</button>
  <div id="result"></div>

<script src="quotes.js"></script>
<script>
function generate() {
  function csvField(str) {
    return '"' + (str || '').replace(/"/g, '""') + '"';
  }
  const rows = ['Quote,Author'];
  for (const q of quotes) {
    rows.push(csvField(q.text) + ',' + csvField(q.author));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quotes.csv';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('result').textContent =
    '✓ Downloaded ' + quotes.length + ' quotes. Now import into Google Sheets!';
}
</script>
</body>
</html>
